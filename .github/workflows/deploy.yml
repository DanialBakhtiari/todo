name: Build & Publish

# On every push to main: build the site and publish ONLY the built output
# (dist/) to the `deploy` branch. The host then clones/pulls that branch, so it
# serves the built files — never the source.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # allow pushing to the deploy branch

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Must match the sub-path the app is served from on the host.
          VITE_BASE: /todo/

      - name: Publish dist to the deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy
          folder: dist
          clean: true
          # Append commits (no force-push) so the host can fast-forward
          # `git pull` / cPanel "Update from Remote" without conflicts.
          force: false
          git-config-name: Danial Bakhtiari
          git-config-email: danialbekhtiari@gmail.com
          commit-message: 'deploy build ${{ github.sha }}'
