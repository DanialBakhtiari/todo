name: Build & Deploy

# Runs on every push to main (and can be triggered manually).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys overlap.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Must match the sub-path the app is served from on the host.
          VITE_BASE: /todo/

      # Uploads only the built site (dist/) to the host over FTPS, syncing
      # incrementally so unchanged files are skipped.
      - name: Deploy to host over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
